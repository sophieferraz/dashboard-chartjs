<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Sensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #DE5D83;
            color: white;
            width: 100%;
            padding: 20px 0px 0px 0px;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 90%;
            max-width: 1200px;
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            flex: 1;
            min-width: 450px;
        }
        h2 { color: #c65c69; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <h1>Monitoramento de Clima</h1>
</header>

<div class="container">
    <div class="chart-card">
        <h2>Tendência de Temperatura e Umidade (Hoje)</h2>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-card">
        <h2>Média Mensal (Janeiro - Junho)</h2>
        <canvas id="barChart"></canvas>
    </div>
</div>

<script>
    const labelsLinha = ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const ctxLinha = document.getElementById('lineChart').getContext('2d');
    
    new Chart(ctxLinha, {
        type: 'line',
        data: {
            labels: labelsLinha,
            datasets: [
                {
                    label: 'Temperatura (°C)',
                    data: [30, 29, 28, 25, 22, 23],
                    borderColor: '#ff6384',
                    backgroundColor: '#ff6384',
                    tension: 0.3
                },
                {
                    label: 'Umidade (%)',
                    data: [80, 82, 80, 85, 80, 83],
                    borderColor: '#FFB6C1',
                    backgroundColor: '#FFB6C1',
                    tension: 0.3
                }
            ]
        }
    });

    const labelsBarras = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'];
    const ctxBarra = document.getElementById('barChart').getContext('2d');

    new Chart(ctxBarra, {
        type: 'bar',
        data: {
            labels: labelsBarras,
            datasets: [
                {
                    label: 'Temp. Média (°C)',
                    data: [22, 24, 27, 23, 20, 18],
                    backgroundColor: '#E9ABAE'
                },
                {
                    label: 'Umidade Média (%)',
                    data: [90, 89, 93, 87, 88, 82],
                    backgroundColor: '#FFDCE7'
                }
            ]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>
